    <!-- Bootstrap Icons -->

            <a class="navbar-brand" href="index.html">

                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#inicio">Inicio</a>
                    </li>

                    <a href="inicio_sesion.html" class="btn btn-outline-light btn-sm">

                </div>
            </div>
        </div>
    </nav>
</header>

<!-- PASSWORD RECOVERY FORM SECTION -->
<section class="login-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="login-card card shadow">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-key-fill login-icon text-primary mb-3"></i>
                            <h2 class="card-title mb-2">Recuperar Contraseña</h2>
                            <p class="text-muted">Ingresa tu correo electrónico para recuperar tu contraseña</p>
                        </div>

                        <form id="recoveryForm" onsubmit="handlePasswordRecovery(event)">
                            <div class="mb-4">
                                <label for="email" class="form-label">
                                    <i class="bi bi-envelope"></i> Correo Electrónico
                                </label>
                                <input type="email" class="form-control" id="email" name="email" required
                                       placeholder="tu@email.com">
                                <div class="invalid-feedback">
                                    Por favor ingresa un correo electrónico válido.
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mb-3">
                                <i class="bi bi-send"></i> Enviar Instrucciones
                            </button>

                            <div class="text-center">
                                <button type="button" class="btn btn-outline-secondary w-100" onclick="window.location.href='inicio_sesion.html'">
                                    <i class="bi bi-arrow-left"></i> Volver al Inicio de Sesión
                                </button>
                            </div>
                        </form>

                        <hr class="my-4">

                        <div class="text-center">
                            <p class="mb-2">¿No tienes cuenta?</p>
                            <a href="registro_propietario.html" class="btn btn-outline-primary">
                                <i class="bi bi-person-plus"></i> Registrarse
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function handlePasswordRecovery(event) {
    event.preventDefault();

    const email = document.getElementById('email').value;

    // Basic validation
    if (!email) {
        alert('Por favor ingresa tu correo electrónico.');
        return;
    }

    // Email validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        alert('Por favor ingresa un correo electrónico válido.');
        return;
    }

    // Mock password recovery
    alert('¡Instrucciones enviadas! Revisa tu correo electrónico para recuperar tu contraseña.');
    window.location.href = 'inicio_sesion.html';
}

        .btn-outline-secondary:hover {

    document.head.appendChild(style);
});
</script>
